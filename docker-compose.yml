services:
  db:
    container_name: efs-postgres-db
    image: postgres:15
    environment:
      POSTGRES_USER: efs_admin
      POSTGRES_PASSWORD: efs_secure_password
      POSTGRES_DB: efs_database
    ports:
      - "5332:5432"
    volumes:
      - efs-db-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  efs-db-data: